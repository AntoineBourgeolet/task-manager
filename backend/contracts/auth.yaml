openapi: 3.0.3
info:
  title: Auth API
  version: 1.0.0

paths:
  /auth/login:
    post:
      summary: Authenticate user and retrieve JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseDTO'
        '401':
          description: Invalid credentials

  /auth/register:
    post:
      summary: Register a new user account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequestDTO'
      responses:
        '201':
          description: Account created and JWT token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseDTO'
        '409':
          description: Username already exists

  /auth/refresh:
    post:
      summary: Refresh JWT access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestDTO'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseDTO'
        '401':
          description: Invalid or expired refresh token

components:
  schemas:
    LoginRequestDTO:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - username
        - password

    RegisterRequestDTO:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - username
        - password

    RefreshTokenRequestDTO:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    AuthResponseDTO:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
        username:
          type: string
      required:
        - accessToken
        - refreshToken
        - tokenType
        - username
